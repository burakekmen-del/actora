name: actora
description: Actora - minimal execution app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  app_links: ^6.3.2
  cross_file: ^0.3.4+2
  share_plus: ^12.0.2
  shared_preferences: ^2.3.2
  http: ^1.2.2
  sensors_plus: ^6.1.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo.png
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/logo.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
